<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base — space-1 … space-12" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);color:var(--text);padding:26px;font-family:var(--font-mono);font-size:11px;}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar{height:16px;background:var(--accent);border-radius:3px;}
  .k{width:90px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row"><span class="k">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="k">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="k">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="k">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="k">space-5 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="k">space-6 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="k">space-8 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="k">space-10 · 80</span><span class="bar" style="width:80px"></span></div>
  <div class="row"><span class="k">space-12 · 96</span><span class="bar" style="width:96px"></span></div>
</body></html>
