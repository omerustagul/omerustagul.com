<!-- @dsCard group="Type" viewport="700x300" name="Display scale" subtitle="General Sans, tight tracking, fluid clamp sizes" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);color:var(--text);padding:26px;}
  .spec{display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border-faint);padding:12px 0;}
  .spec:last-child{border:0;}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
  .line{font-family:var(--font-display);font-weight:600;letter-spacing:-0.03em;line-height:1;}
</style></head>
<body>
  <div class="spec"><span class="tag">display-2xl · clamp 52→144px</span><span class="line" style="font-size:var(--fs-display-lg)">Dijitalde yeni standart</span></div>
  <div class="spec"><span class="tag">display-lg · h1</span><span class="line" style="font-size:var(--fs-h1)">Ödüllü kreatif iş</span></div>
  <div class="spec"><span class="tag">h2</span><span class="line" style="font-size:var(--fs-h2);font-weight:600">Son Projeler</span></div>
  <div class="spec"><span class="tag">h3</span><span class="line" style="font-size:var(--fs-h3);font-weight:600">Atlas Finans yeniden markalaşma</span></div>
</body></html>
