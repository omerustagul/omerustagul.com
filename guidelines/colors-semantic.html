<!-- @dsCard group="Colors" viewport="700x170" name="Semantic — Light & Dark" subtitle="bg / surface / text / border in both themes" -->
<!DOCTYPE html>
<html lang="tr"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;display:flex;font-family:var(--font-mono);font-size:11px;}
  .pane{flex:1;padding:18px;}
  .pane.light{background:#fafafa;color:#0a0a0a;}
  .pane h4{font-family:var(--font-sans);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 12px;opacity:.6;}
  .chips{display:flex;flex-direction:column;gap:8px;}
  .chip{display:flex;align-items:center;gap:10px;}
  .box{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);}
</style></head>
<body>
<div class="pane light">
  <h4>Light</h4>
  <div class="chips">
    <div class="chip"><span class="box" style="background:var(--bg)"></span> --bg #FAFAFA</div>
    <div class="chip"><span class="box" style="background:var(--surface)"></span> --surface #FFFFFF</div>
    <div class="chip"><span class="box" style="background:var(--text)"></span> --text #0A0A0A</div>
    <div class="chip"><span class="box" style="background:var(--border)"></span> --border #DDDDDD</div>
  </div>
</div>
<div class="pane theme-dark" style="background:#0a0a0a;color:#fafafa;">
  <h4>Dark</h4>
  <div class="chips">
    <div class="chip"><span class="box" style="background:var(--bg)"></span> --bg #0A0A0A</div>
    <div class="chip"><span class="box" style="background:var(--surface)"></span> --surface #141414</div>
    <div class="chip"><span class="box" style="background:var(--text)"></span> --text #FAFAFA</div>
    <div class="chip"><span class="box" style="background:var(--border)"></span> --border #2A2A2A</div>
  </div>
</div>
</body></html>
