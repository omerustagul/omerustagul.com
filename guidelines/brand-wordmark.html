<!DOCTYPE html>
<html lang="tr"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;display:flex;}
  .pane{flex:1;display:flex;align-items:center;justify-content:center;height:200px;}
  .light{background:#fafafa;}
  .dark{background:#0a0a0a;}
  .wm{font-family:var(--font-sans);font-weight:700;letter-spacing:-0.04em;font-size:64px;}
  .light .wm{color:#0a0a0a;}
  .dark .wm{color:#fafafa;}
  .dot{color:#16d17f;}
</style></head>
<body>
  <div class="pane light"><span class="wm">Marka<span class="dot">.</span></span></div>
  <div class="pane dark"><span class="wm">Marka<span class="dot">.</span></span></div>
</body></html>
