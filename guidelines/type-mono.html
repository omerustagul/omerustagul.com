<!-- @dsCard group="Type" viewport="700x180" name="Mono — labels, scores, prices" subtitle="JetBrains Mono for eyebrows, ratings, dates, prices" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);color:var(--text);padding:26px;font-family:var(--font-mono);}
  .grid{display:flex;flex-direction:column;gap:18px;}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);display:inline-flex;align-items:center;gap:8px;}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--accent);}
  .row{display:flex;gap:28px;align-items:baseline;flex-wrap:wrap;}
  .big{font-size:28px;font-weight:500;}
  .muted{color:var(--text-muted);font-size:13px;}
  .price{font-size:22px;font-weight:500;}
</style></head>
<body><div class="grid">
  <span class="eyebrow">Öne Çıkan İş — Haziran 2026</span>
  <div class="row">
    <span class="big">4.9<span class="muted"> / 5</span></span>
    <span class="big">12.06.2026</span>
    <span class="price">59 USD<span class="muted">'den</span></span>
    <span class="big" style="color:var(--accent)">+128</span>
  </div>
</div></body></html>
