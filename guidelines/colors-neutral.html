<!-- @dsCard group="Colors" viewport="700x150" name="Neutral — Ink ramp" subtitle="Off-white #FAFAFA to near-black #0A0A0A" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-mono);}
  .row{display:flex;gap:6px;}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:104px;border-radius:var(--radius-sm);padding:8px;font-size:10px;border:1px solid var(--border-faint);}
  .sw b{font-weight:600;}
</style></head>
<body><div class="row">
  <div class="sw" style="background:var(--ink-0);color:#0a0a0a"><b>0</b></div>
  <div class="sw" style="background:var(--ink-50);color:#0a0a0a"><b>50</b></div>
  <div class="sw" style="background:var(--ink-100);color:#0a0a0a"><b>100</b></div>
  <div class="sw" style="background:var(--ink-200);color:#0a0a0a"><b>200</b></div>
  <div class="sw" style="background:var(--ink-300);color:#0a0a0a"><b>300</b></div>
  <div class="sw" style="background:var(--ink-400);color:#0a0a0a"><b>400</b></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><b>500</b></div>
  <div class="sw" style="background:var(--ink-600);color:#fff"><b>600</b></div>
  <div class="sw" style="background:var(--ink-700);color:#fff"><b>700</b></div>
  <div class="sw" style="background:var(--ink-800);color:#fff"><b>800</b></div>
  <div class="sw" style="background:var(--ink-900);color:#fff"><b>900</b></div>
</div></body></html>
