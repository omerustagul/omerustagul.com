<link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; background:var(--bg); color:var(--text); padding:28px; }

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ProjectCard, CourseCard, BlogCard, ProductCard } = window.MarkaCreativeAgencyDesignSystem_68806e;
function Demo(){
  return (
    <div className="grid">
      <ProjectCard title="Atlas Finans" client="Atlas Bank · 2026" category="WEB" />

      <ProductCard title="Grid UI Kit" seller="Marka Studio" format="Figma" price="59 USD" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
