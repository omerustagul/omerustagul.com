<!-- @dsCard group="Components" viewport="700x320" name="Media — Marquee & Frame" subtitle="Infinite partner marquee + media frame with placeholder" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; background:var(--bg); color:var(--text); padding:28px; }
  .wrap{ display:flex; flex-direction:column; gap:26px; }
  .pl{ font-family:var(--font-mono); font-size:18px; font-weight:500; color:var(--text-muted); }
  .lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Marquee, Media } = window.MarkaCreativeAgencyDesignSystem_68806e;
const brands = ["ATLAS","NOVA","KÖK","VENTA","ORBİT","FORM","PERA","LUMA"];
function Demo(){
  return (
    <div className="wrap">
      <span className="lbl">Marquee — partner logos (pauses on hover)</span>
      <Marquee speed={24}>{brands.map(b => <span className="pl" key={b}>{b}</span>)}</Marquee>
      <span className="lbl">Media frame — 16/9 placeholder</span>
      <div style={{maxWidth:340}}><Media ratio="16/9" label="GÖRSEL ALANI" /></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
