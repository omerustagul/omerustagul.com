<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; background:var(--bg); color:var(--text); padding:28px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px 28px; align-items:start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select } = window.MarkaCreativeAgencyDesignSystem_68806e;
function Demo(){
  return (
    <div className="grid">
      <Input label="Ad Soyad" placeholder="Adınız" defaultValue="Ada Yılmaz" />
      <Input label="E-posta" placeholder="siz@ornek.com" hint="Yanıtı buraya göndereceğiz" />
      <Select label="Bütçe" defaultValue="2"><option value="1">₺50K altı</option><option value="2">₺50K–150K</option><option value="3">₺150K+</option></Select>
      <Input label="Şirket" variant="underline" placeholder="Editoryal stil" />
      <div style={{gridColumn:"1 / -1"}}>
        <Input label="Mesaj" as="textarea" placeholder="Projenizden bahsedin…" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
