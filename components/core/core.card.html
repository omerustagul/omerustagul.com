<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; background:var(--bg); color:var(--text); padding:28px; }
  .grid{ display:flex; flex-direction:column; gap:26px; }
  .row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); width:100%; margin-bottom:-8px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, Avatar, AvatarStack, Rating } = window.MarkaCreativeAgencyDesignSystem_68806e;
const Arrow = () => <span>→</span>;
function Demo(){
  return (
    <div className="grid">
      <div className="row"><span className="lbl">Button — variants</span>
        <Button variant="primary" iconRight={<Arrow/>}>Teklif Al</Button>
        <Button variant="secondary">İncele</Button>
        <Button variant="ghost" iconRight={<Arrow/>}>Tümünü Gör</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="row"><span className="lbl">Button — sizes</span>
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg" iconRight={<Arrow/>}>Large</Button>
      </div>
      <div className="row"><span className="lbl">Icon buttons</span>
        <IconButton variant="outline" label="prev">←</IconButton>
        <IconButton variant="solid" label="next">→</IconButton>
        <IconButton variant="ghost" label="more">＋</IconButton>
      </div>
      <div className="row"><span className="lbl">Badges & tags</span>
        <Badge variant="solid">PROJE</Badge>
        <Badge variant="outline">DİJİTAL ÜRÜN</Badge>
        <Badge variant="muted" dot>Yayında</Badge>
        <Badge variant="invert">2026</Badge>
        <Tag active>Tümü</Tag>
        <Tag count={42}>Web</Tag>
        <Tag count={18}>Marka</Tag>
      </div>
      <div className="row"><span className="lbl">Avatars & rating</span>
        <Avatar name="Ada Yıl" size="md" />
        <AvatarStack size="sm" people={[{name:"A B"},{name:"C D"},{name:"E F"},{name:"G H"},{name:"I J"}]} />
        <Rating value={4.9} count={128} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
