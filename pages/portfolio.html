<!-- @dsCard group="Website" viewport="1440x820" name="İşler — Portfolio" subtitle="Filter bar + masonry project grid + count" -->
<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>İşler — Marka</title>
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="../ui_kits/website/site.css" />
<link rel="stylesheet" href="pages.css" />
<script>window.MK_BASE = "../";</script>
<script src="../theme/theme.js"></script>
<script src="../theme/pages.js"></script>
<script src="../theme/members.js"></script>
<script src="../theme/community-cfg.js"></script>
<script src="../theme/bookings.js"></script>
<script src="../theme/votes.js"></script>
<script src="../theme/i18n.js"></script>
<script src="../theme/inline-edit.js"></script>
</head>
<body data-page="portfolio">
<div class="mk-site">
  <div id="mk-header"></div>
  <main class="page wrap">
    <header class="page__head reveal">
      <span class="eyebrow">Portfolyo</span>
      <h1>Ödüllü işlerin arşivi</h1>
      <p>Marka, ürün ve dijital deneyimler. Kategoriye, teknolojiye ve yıla göre keşfedin.</p>
    </header>

    <div class="filterbar reveal">
      <button class="chip" aria-pressed="true">Tümü</button>
      <button class="chip">Web</button>
      <button class="chip">Marka</button>
      <button class="chip">UI/UX</button>
      <button class="chip">E-ticaret</button>
      <button class="chip">Motion</button>
      <span class="count">Toplam 48 proje</span>
    </div>

    <div class="grid-masonry" id="grid"></div>
  </main>
  <div id="mk-footer"></div>
</div>

<script type="module">
  import { BRAND_NAME, BRAND_SLOGAN, BRAND_SOCIAL } from "../brand/brand.js";
  window.MARKA = { BRAND_NAME, BRAND_SLOGAN, BRAND_SOCIAL };
</script>
<script>
  const works = [
    ["Atlas Finans", "Atlas Bank · 2026", "MARKA", "21/13"],
    ["Nova Spor", "Nova · 2026", "UI/UX", "4/5"],
    ["Pera Galeri", "Pera Sanat · 2025", "WEB", "4/3"],
    ["Venta", "Venta · 2026", "E-TİCARET", "4/5"],
    ["Orbit Studio", "Orbit · 2025", "MOTION", "4/3"],
    ["Form Co.", "Form · 2026", "MARKA", "4/4"],
    ["Luma", "Luma · 2025", "WEB", "4/5"],
    ["Kök Tarım", "Kök · 2026", "UI/UX", "4/3"],
    ["Pera Festival", "Pera · 2025", "MOTION", "4/4"],
  ];
  document.getElementById("grid").innerHTML = works.map(([t, c, cat, r], i) => `
    <a class="card reveal" href="project.html" data-cursor="Projeyi Gör">
      <div style="position:relative">
        <div class="ph" style="aspect-ratio:${r.replace('/',' / ')}"><div class="ph__in" style="filter:hue-rotate(${i*35}deg)"></div><span class="ph__tag">PROJE GÖRSELİ</span></div>
        <span class="cardlabel">Projeyi Gör →</span>
      </div>
      <div class="card__top"><span class="badge badge--outline">PROJE</span><span class="card__meta mono">${cat}</span></div>
      <h3 class="card__title">${t}</h3>
      <span class="card__meta">${c}</span>
    </a>`).join("");

  document.querySelectorAll(".chip").forEach(ch => ch.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.setAttribute("aria-pressed", "false"));
    ch.setAttribute("aria-pressed", "true");
  }));
</script>
<script src="../ui_kits/website/motion.js"></script>
<script src="../theme/site-chrome.js"></script>
</body>
</html>
