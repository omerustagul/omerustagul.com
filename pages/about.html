<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hakkımızda — Marka</title>
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="../ui_kits/website/site.css" />
<link rel="stylesheet" href="pages.css" />
<script>window.MK_BASE = "../";</script>
<script src="../theme/theme.js"></script>
<script src="../theme/pages.js"></script>
<script src="../theme/members.js"></script>
<script src="../theme/community-cfg.js"></script>
<script src="../theme/bookings.js"></script>
<script src="../theme/votes.js"></script>
<script src="../theme/i18n.js"></script>
<script src="../theme/inline-edit.js"></script>
</head>
<body data-page="about">
<div class="mk-site">
  <div id="mk-header"></div>
  <main class="page wrap">
    <header class="page__head reveal">
      <span class="eyebrow">Hakkımızda</span>
      <h1 class="manifesto">Markaları <em>dijitalde</em> yeni bir standarda taşıyoruz.</h1>
    </header>

    <section class="section">
      <div class="stats reveal">
        <div class="stat"><div class="stat__num" data-count="240">240<span class="u">+</span></div><div class="stat__label">Tamamlanan proje</div></div>
        <div class="stat"><div class="stat__num" data-count="98">98<span class="u">%</span></div><div class="stat__label">Mutlu müşteri</div></div>
        <div class="stat"><div class="stat__num" data-count="31">31<span class="u"></span></div><div class="stat__label">Kazanılan ödül</div></div>
      </div>
    </section>

    <section class="section">
      <header class="reveal" style="margin-bottom:var(--space-7)"><span class="eyebrow">Ekip</span><h2 style="font-size:var(--fs-h1);font-weight:600;margin-top:1rem">Birlikte çalıştığın insanlar</h2></header>
      <div class="team" id="team"></div>
    </section>
  </main>
  <div id="mk-footer"></div>
</div>

<script type="module">
  import { BRAND_NAME, BRAND_SLOGAN, BRAND_SOCIAL } from "../brand/brand.js";
  window.MARKA = { BRAND_NAME, BRAND_SLOGAN, BRAND_SOCIAL };
</script>
<script>
  const team = [
    ["Deniz Arı", "Kurucu & Kreatif Direktör"],
    ["Ece Kaya", "Tasarım Lideri"],
    ["Mert Su", "Teknoloji Direktörü"],
    ["Lale Yön", "Strateji Direktörü"],
    ["Can Ak", "Kıdemli Geliştirici"],
    ["Su Demir", "Marka Tasarımcısı"],
    ["Ada Yıl", "Ürün Tasarımcısı"],
    ["Kaan Er", "Motion Tasarımcısı"],
  ];
  document.getElementById("team").innerHTML = team.map(([n, role], i) => `
    <div class="reveal" data-cursor>
      <div class="ph" style="aspect-ratio:3 / 4"><div class="ph__in" style="filter:hue-rotate(${i*28}deg)"></div><span class="ph__tag">PORTRE</span></div>
      <h4>${n}</h4><span>${role}</span>
    </div>`).join("");
</script>
<script src="../ui_kits/website/motion.js"></script>
<script src="../theme/site-chrome.js"></script>
</body>
</html>
